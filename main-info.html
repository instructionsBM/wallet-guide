<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Вывод — БК Олимп</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #E8E0D8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .phone {
    width: 390px;
    min-height: 844px;
    background: #fff;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 80px rgba(0,0,0,0.2);
  }
  .status-bar {
    background: #7B1C1C;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 12px;
    color: #fff;
    font-weight: 500;
  }
  .header {
    background: #7B1C1C;
    padding: 12px 16px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-back { color: #fff; font-size: 24px; }
  .header-title { color: #fff; font-size: 18px; font-weight: 600; }
  .header-icon {
    margin-left: auto;
    width: 40px; height: 40px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .content {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .status-text {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }
  .status-badge {
    background: #EAF5EC;
    border: 1.5px solid #B2D9BA;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 500;
    color: #3D7A4A;
  }
  .tg-text {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }
  .tg-text a {
    color: #0088CC;
    text-decoration: none;
  }
  .tg-hint {
    font-size: 13px;
    color: #999;
    line-height: 1.5;
    margin-top: -8px;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="status-bar">
    <span>14:19</span>
    <span>▐▌ LTE 32</span>
  </div>

  <div class="header">
    <span class="header-back">‹</span>
    <span class="header-title">Вывод</span>
    <div class="header-icon">👁</div>
  </div>

  <div class="content">

    <p class="status-text">
      Ожидайте, как только заявка будет одобрена, вы получите СМС с инструкцией как вывести средства себе на карту.
    </p>

    <div class="status-badge">
      <span>✅</span>
      <span>В обработке к снятию</span>
    </div>

    <p class="tg-text">
      Узнайте, когда деньги поступят — <a href="https://t.me/BromoneyBot">пришлём уведомление о зачислении в Telegram</a>
    </p>

    <p class="tg-hint">
      Для авторизации используйте номер телефона из профиля Olimp
    </p>

  </div>
</div>
</body>
</html>
